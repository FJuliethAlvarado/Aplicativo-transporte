{% extends "admin.html" %}

{% block title %}Gestión de Usuarios{% endblock %}

{% block content %}
<h1>Gestión de Usuarios</h1>

<!-- Sección: Crear nuevo usuario -->
<section class="form-section">
    <h2>Crear nuevo usuario</h2>

    <form method="POST" action="{{ url_for('crear_usuario') }}" class="user-form">

        <div class="form-grid">

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
            </div>

            <div class="form-group">
                <label for="correo">Correo</label>
                <input type="email" id="correo" name="correo" placeholder="correo@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="tipo">Rol</label>
                <select id="tipo" name="tipo" required>
                    <option value="usuario">Usuario</option>
                    <option value="conductor">Conductor</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>

        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-new">Crear usuario</button>
        </div>

    </form>
</section>


<!-- Sección: Lista de usuarios -->
<section class="table-section">
    <h2>Usuarios registrados</h2>

    <div class="table-container">
        <table class="user-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>
                {% for u in usuarios %}
                <tr>
                    <td>{{ u.nombre }}</td>
                    <td>{{ u.email }}</td>

                    <td>
                        <span class="badge 
                            {% if u.tipo == 'administrador' %}badge-admin
                            {% elif u.tipo == 'conductor' %}badge-driver
                            {% else %}badge-user
                            {% endif %}">
                            {{ u.tipo }}
                        </span>
                    </td>

                    <td class="actions">
                        <a href="{{ url_for('editar_usuario', id=u.id) }}" class="btn btn-edit">
                            <i class="fa fa-pencil-alt"></i>
                        </a>

                                    <a href="{{ url_for('eliminar_usuario', id=u.id) }}"
                class="btn btn-delete"
                onclick="return confirm('¿Estás seguro de eliminar este usuario?');">
            <i class="fa fa-trash"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
