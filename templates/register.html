<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RouteX - Registro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #e2e8f0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("/static/fondo.png") center/cover no-repeat;
            filter: blur(6px);
            transform: scale(1.08);
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(2,6,23,0.85),
                rgba(15,23,42,0.85),
                rgba(17,24,39,0.9)
            );
            z-index: -1;
        }

        /* LOADER */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(14,165,233,0.2);
            border-top: 4px solid #0ea5e9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        #loader p {
            margin-top: 15px;
            color: #0ea5e9;
        }

        /* TOPBAR */
        .topbar {
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .logo-img {
            width: 35px;
            height: 35px;
        }

        .topbar nav {
            display: flex;
            gap: 25px;
        }

        .topbar nav a {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .topbar nav a:hover {
            color: #0ea5e9;
            background: rgba(14,165,233,0.1);
        }

        /* Botón menú móvil */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Menú móvil */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 65px;
            left: 0;
            right: 0;
            background: #0f172a;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu a {
            color: #e2e8f0;
            text-decoration: none;
            padding: 12px;
            text-align: center;
            background: #1e293b;
            border-radius: 8px;
        }

        /* CONTENIDO PRINCIPAL */
        .main-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px 60px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            width: 60px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header h1 span {
            color: #0ea5e9;
        }

        .header p {
            color: #94a3b8;
        }

        /* CARD */
        .card {
            background: rgba(17,24,39,0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5rem;
            color: white;
        }

        /* INPUT GROUP */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(30,41,59,0.8);
            color: #e2e8f0;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
        }

        .password-group .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            transition: color 0.3s;
        }

        .password-group .toggle-password:hover {
            color: #0ea5e9;
        }

        /* TIPO USUARIO - ICONOS */
        .user-type-section {
            margin: 25px 0;
        }

        .user-type-title {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
        }

        .user-type-options {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .user-type-card {
            flex: 1;
            background: rgba(30,41,59,0.6);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .user-type-card:hover {
            background: rgba(14,165,233,0.1);
            border-color: #0ea5e9;
        }

        .user-type-card.selected {
            background: rgba(14,165,233,0.15);
            border-color: #0ea5e9;
        }

        .user-type-card input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .user-type-card i {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .user-type-card .usuario-icon i {
            color: #60a5fa;
        }

        .user-type-card .conductor-icon i {
            color: #f59e0b;
        }

        .user-type-card span {
            font-size: 14px;
            font-weight: 500;
        }

        /* BOTÓN */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14,165,233,0.3);
        }

        /* ERROR */
        .error {
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            font-size: 0.85rem;
        }

        /* REGISTER LINK */
        .register {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }

        .register a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: bold;
        }

        .register a:hover {
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .topbar nav {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .card {
                padding: 30px 25px;
            }

            .user-type-options {
                flex-direction: column;
                gap: 10px;
            }

            .user-type-card {
                display: flex;
                align-items: center;
                gap: 15px;
                padding: 12px;
            }

            .user-type-card i {
                font-size: 30px;
                margin-bottom: 0;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .input-group input {
                padding: 12px 15px 12px 40px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
    <p>Cargando RouteX...</p>
</div>

<header class="topbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo-img" alt="logo">
        RouteX
    </div>

    <nav>
        <a href="{{ url_for('home') }}">Inicio</a>
        <a href="{{ url_for('login') }}">Iniciar sesión</a>
    </nav>

    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fa fa-bars"></i>
    </button>
</header>


<div class="main-container">
    <div>
        <div class="header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="logo">
            <h1>Route<span>X</span></h1>
            <p>Regístrate y comienza a viajar</p>
        </div>

        <div class="card">
            <h3>Crear cuenta</h3>

            <form method="POST" action="{{ url_for('register') }}">
                <!-- NOMBRE -->
                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" name="nombre" placeholder="Nombre completo" required>
                </div>

                <!-- CORREO -->
                <div class="input-group">
                    <i class="fa fa-envelope"></i>
                    <input type="email" name="correo" placeholder="Correo electrónico" required>
                </div>

                <!-- PASSWORD -->
                <div class="input-group password-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="pass1" name="password" placeholder="Contraseña" required>
                    <i class="fa fa-eye toggle-password" onclick="togglePassword('pass1')"></i>
                </div>

                <!-- CONFIRMAR PASSWORD -->
                <div class="input-group password-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="pass2" name="confirm_password" placeholder="Confirmar contraseña" required>
                    <i class="fa fa-eye toggle-password" onclick="togglePassword('pass2')"></i>
                </div>

                <!-- TIPO USUARIO CON ICONOS -->
                <div class="user-type-section">
                    <div class="user-type-title">Tipo de cuenta</div>
                    <div class="user-type-options">
                        <label class="user-type-card" id="usuarioCard">
                            <i class="fa fa-user-circle"></i>
                            <span>Usuario</span>
                            <input type="radio" name="userType" value="usuario" checked>
                        </label>
                        <label class="user-type-card" id="conductorCard">
                            <i class="fa fa-id-card"></i>
                            <span>Conductor</span>
                            <input type="radio" name="userType" value="conductor">
                        </label>
                    </div>
                </div>

                <!-- BOTÓN -->
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>

            <!-- ERROR -->
            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <p class="register">
                ¿Ya tienes cuenta?
                <a href="{{ url_for('login') }}">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Loader
    window.addEventListener("load", function() {
        const loader = document.getElementById("loader");
        setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => {
                loader.style.display = "none";
            }, 500);
        }, 800);
    });

    // Mostrar/ocultar contraseña
    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        const icon = input.parentElement.querySelector(".toggle-password");
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }

    // Selección de tipo de usuario con cards
    const usuarioCard = document.getElementById('usuarioCard');
    const conductorCard = document.getElementById('conductorCard');
    const usuarioRadio = document.querySelector('input[value="usuario"]');
    const conductorRadio = document.querySelector('input[value="conductor"]');

    function updateSelection() {
        if (usuarioRadio.checked) {
            usuarioCard.classList.add('selected');
            conductorCard.classList.remove('selected');
        } else {
            conductorCard.classList.add('selected');
            usuarioCard.classList.remove('selected');
        }
    }

    usuarioCard.addEventListener('click', () => {
        usuarioRadio.checked = true;
        updateSelection();
    });

    conductorCard.addEventListener('click', () => {
        conductorRadio.checked = true;
        updateSelection();
    });

    // Inicializar selección
    updateSelection();

    // Menú móvil
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
        });

        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
            });
        });
    }

    // Cerrar menú al hacer clic fuera
    document.addEventListener('click', (e) => {
        if (mobileMenu && mobileMenu.classList.contains('active')) {
            if (!mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                mobileMenu.classList.remove('active');
            }
        }
    });
</script>

</body>
</html>
