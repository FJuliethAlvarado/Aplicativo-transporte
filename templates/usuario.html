<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mapa Usuario - Transporte App</title>

<link rel="stylesheet" href="{{ url_for('static', filename='usuario.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <i class="fa fa-bars" id="menu-btn"></i>
    <div class="search">
        <i class="fa fa-search"></i>
        <input type="text" id="search-input" placeholder="Buscar ruta o destino">
    </div>
    <i class="fa fa-bell" id="notif-btn"></i>
</div>

<!-- PANEL LATERAL -->
<div id="sidebar" class="sidebar">
  <div class="panel-header">
    <h3>Información de Ruta</h3>
    <button id="sidebarClose" class="panel-close" aria-label="Cerrar panel">×</button>
  </div>
  <div id="ruta-info">
    <div id="proximos-buses"></div>
    <div id="tiempos-paradas"></div>
    <div id="tarifas"></div>
  </div>
</div>

<!-- PANEL DE NOTIFICACIONES -->
<div id="notifications" class="notifications">
  <div class="panel-header">
    <h3>Notificaciones</h3>
    <button id="notifClose" class="panel-close" aria-label="Cerrar notificaciones">×</button>
  </div>
  <ul id="notif-list">
    <li>Bienvenido al sistema de transporte</li>
  </ul>
</div>

<!-- LISTA DE RUTAS EN SUBVENTANA INFERIOR -->
<div id="route-sheet" class="route-sheet" aria-hidden="true">
  <div class="panel-header">
    <h3>Rutas disponibles</h3>
    <button id="routeSheetClose" class="panel-close" aria-label="Cerrar lista de rutas">×</button>
  </div>
  <ul id="route-items"></ul>
</div>

<!-- MAPA -->
<div id="map" style="width:100%; height:calc(100vh - 60px);"></div>

<!-- BOTONES MAPA -->
<div class="map-controls">
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
    <button onclick="locate()">📍</button>
</div>

<!-- CARDS INFERIORES -->
<div class="cards">
    <div class="card" onclick="mostrarTodasRutas()">
        <i class="fa fa-route"></i>
        <div>
            <b>Ver rutas</b>
            <p>Todas las rutas</p>
        </div>
    </div>
    <div class="card" onclick="alternarSentido()">
        <i class="fa fa-exchange-alt"></i>
        <div>
            <b>Sentido</b>
            <p id="sentido-texto">Ida</p>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <div class="active"><i class="fa fa-home"></i><span>Inicio</span></div>
    <div><i class="fa fa-route"></i><span>Rutas</span></div>
    <div><i class="fa fa-star"></i><span>Favoritos</span></div>
    <div onclick="window.location.href='{{ url_for('perfil') }}'"><i class="fa fa-user"></i><span>Perfil</span></div>
    <div onclick="cerrarSesion()"><i class="fa fa-sign-out-alt"></i><span>Cerrar</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== INICIALIZAR MAPA ====================
var map = L.map('map').setView([4.917, -74.028], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// ==================== VARIABLES GLOBALES ====================
var todasLasRutas = [];      // Almacena todas las rutas originales
var rutasVisibles = [];      // Almacena las rutas actualmente visibles
var sentidoActual = 'ida';
var busActivo = null;
var busConductor = null;
var intervaloBus = null;
var busIntervaloId = null;

// ==================== CARGAR RUTAS DESDE LA API ====================
async function cargarRutas() {
    try {
        const response = await fetch('/api/rutas');
        const rutas = await response.json();
        
        console.log('Rutas recibidas:', rutas);
        
        // ✅ REGISTRAR EVENTO DE VER RUTAS
        fetch('/api/log-event', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                accion: 'ver_rutas',
                descripcion: `Consultó ${rutas.length} rutas disponibles`
            })
        }).catch(e => console.error('Error registrando evento:', e));
        
        if (rutas.length === 0) {
            mostrarNotificacion('No hay rutas disponibles', 'warning');
            return;
        }
        
        // Guardar todas las rutas y separar las que tienen coordenadas
        todasLasRutas = rutas;
        const rutasConCoordenadas = todasLasRutas.filter(r => r.coordenadas_ida && r.coordenadas_vuelta);
        
        if (rutasConCoordenadas.length === 0) {
            mostrarNotificacion('Las rutas no tienen coordenadas para dibujar', 'warning');
        } else {
            dibujarTodasLasRutas(rutasConCoordenadas);
        }
        
        mostrarNotificacion(`✅ ${todasLasRutas.length} rutas cargadas`, 'success');
        
    } catch (error) {
        console.error('Error:', error);
        mostrarNotificacion('Error al cargar rutas', 'error');
    }
}

// ==================== DIBUJAR TODAS LAS RUTAS ====================
function dibujarTodasLasRutas(rutas) {
    // Limpiar rutas anteriores
    rutasVisibles.forEach(item => {
        if (item.linea) map.removeLayer(item.linea);
        if (item.origenMarker) map.removeLayer(item.origenMarker);
        if (item.destinoMarker) map.removeLayer(item.destinoMarker);
    });
    rutasVisibles = [];
    
    // Dibujar cada ruta con coordenadas válidas
    rutas.forEach(ruta => {
        dibujarRuta(ruta);
    });
}

// ==================== DIBUJAR UNA RUTA ====================
function dibujarRuta(ruta) {
    try {
        // Obtener coordenadas según sentido
        let coordenadas, duracion, distancia, origenTexto, destinoTexto;
        
        if (sentidoActual === 'ida') {
            coordenadas = JSON.parse(ruta.coordenadas_ida);
            duracion = ruta.duracion_ida;
            distancia = ruta.distancia_ida;
            origenTexto = ruta.origen;
            destinoTexto = ruta.destino;
        } else {
            coordenadas = JSON.parse(ruta.coordenadas_vuelta);
            duracion = ruta.duracion_vuelta;
            distancia = ruta.distancia_vuelta;
            origenTexto = ruta.destino;
            destinoTexto = ruta.origen;
        }
        
        if (!coordenadas || coordenadas.length === 0) return;
        
        // Color según tipo
        const color = ruta.tipo === 'interna' ? '#0066cc' : '#ea580c';
        
        // Dibujar línea de la ruta
        const rutaLine = L.polyline(coordenadas, {
            color: color,
            weight: 5,
            opacity: 0.8
        }).addTo(map);
        
        const tarifaTexto = calcularTarifa(ruta);
        
        // Popup con información y botón de simulación
        rutaLine.bindPopup(`
            <div style="min-width: 220px; font-family: Arial, sans-serif;">
                <b style="font-size: 16px;">🚌 ${ruta.nombre}</b><br>
                <hr style="margin: 5px 0;">
                <b>📍 Origen:</b> ${origenTexto}<br>
                <b>🏁 Destino:</b> ${destinoTexto}<br>
                <b>⏰ Horario:</b> ${ruta.horario || 'No disponible'}<br>
                <b>💲 Tarifa:</b> ${tarifaTexto}<br>
                <b>📋 Tipo:</b> ${ruta.tipo === 'interna' ? 'Interna' : 'Intermunicipal'}<br>
                <b>🔄 Sentido:</b> ${sentidoActual === 'ida' ? 'Ida' : 'Vuelta'}<br>
                <b>⏱ Duración:</b> ${duracion} min<br>
                <b>📏 Distancia:</b> ${distancia} km<br>
                <hr style="margin: 5px 0;">
                <button onclick="simularBus(${ruta.id})" style="background: #0066cc; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 14px;">
                    🚌 SIMULAR BUS EN MOVIMIENTO
                </button>
            </div>
        `);
        
        // Marcador de origen
        const origenMarker = L.marker(coordenadas[0], {
            icon: L.divIcon({
                html: '<i class="fa fa-map-marker" style="font-size: 28px; color: green; text-shadow: 0 0 3px white;"></i>',
                iconSize: [28, 28]
            })
        }).addTo(map);
        origenMarker.bindPopup(`<b>📍 ORIGEN</b><br>${origenTexto}`);
        
        // Marcador de destino
        const destinoMarker = L.marker(coordenadas[coordenadas.length - 1], {
            icon: L.divIcon({
                html: '<i class="fa fa-map-marker" style="font-size: 28px; color: red; text-shadow: 0 0 3px white;"></i>',
                iconSize: [28, 28]
            })
        }).addTo(map);
        destinoMarker.bindPopup(`<b>🏁 DESTINO</b><br>${destinoTexto}`);
        
        // Guardar referencia
        rutasVisibles.push({
            id: ruta.id,
            nombre: ruta.nombre,
            linea: rutaLine,
            coordenadas: coordenadas,
            duracion: duracion,
            distancia: distancia,
            origen: origenTexto,
            destino: destinoTexto,
            origenMarker: origenMarker,
            destinoMarker: destinoMarker,
            rutaOriginal: ruta
        });
        
    } catch (error) {
        console.error('Error dibujando ruta:', error);
    }
}

// ==================== ALTERNAR SENTIDO ====================
function alternarSentido() {
    sentidoActual = sentidoActual === 'ida' ? 'vuelta' : 'ida';
    document.getElementById('sentido-texto').innerHTML = sentidoActual === 'ida' ? 'Ida' : 'Vuelta';
    
    // ❌ REGISTRAR EVENTO AL SERVIDOR
    fetch('/api/log-event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            accion: 'alternar_sentido',
            descripcion: `Cambió a sentido: ${sentidoActual === 'ida' ? 'Ida' : 'Vuelta'}`
        })
    }).catch(e => console.error('Error registrando evento:', e));
    
    // Detener bus si está en movimiento
    if (intervaloBus) {
        clearInterval(intervaloBus);
        intervaloBus = null;
    }
    if (busActivo) {
        map.removeLayer(busActivo);
        busActivo = null;
    }
    
    // Redibujar rutas
    dibujarTodasLasRutas();
    
    mostrarNotificacion(`Cambiando a sentido: ${sentidoActual === 'ida' ? 'Ida' : 'Vuelta'}`, 'info');
}

// ==================== SIMULAR BUS ====================
function simularBus(rutaId) {
    // Buscar la ruta en las rutas visibles
    const rutaData = rutasVisibles.find(r => r.id === rutaId);
    
    if (!rutaData) {
        mostrarNotificacion('Error: No se encontró la ruta', 'error');
        console.log('Rutas disponibles:', rutasVisibles);
        console.log('Buscando ID:', rutaId);
        return;
    }
    
    console.log('Simulando bus para:', rutaData.nombre);
    
    // ❌ REGISTRAR EVENTO AL SERVIDOR
    fetch('/api/log-event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            accion: 'simular_bus',
            descripcion: `Simuló recorrido de ruta: ${rutaData.nombre}`,
            datos_adicionales: JSON.stringify({ ruta_id: rutaId, sentido: sentidoActual })
        })
    }).catch(e => console.error('Error registrando evento:', e));
    
    // Detener bus anterior
    if (intervaloBus) {
        clearInterval(intervaloBus);
        intervaloBus = null;
    }
    if (busActivo) {
        map.removeLayer(busActivo);
        busActivo = null;
    }
    
    const coordenadas = rutaData.coordenadas;
    let indice = 0;
    let direccion = 1;
    
    // Icono del bus
    const busIcono = L.divIcon({
        html: '<i class="fa fa-bus" style="font-size: 34px; color: #0066cc; text-shadow: 0 0 3px white;"></i>',
        iconSize: [34, 34],
        className: 'bus-marker'
    });
    
    // Crear marcador del bus
    busActivo = L.marker(coordenadas[0], {icon: busIcono}).addTo(map);
    map.setView(coordenadas[0], 15);
    
    mostrarNotificacion(`🚌 Simulando bus: ${rutaData.nombre} (${sentidoActual === 'ida' ? 'Ida' : 'Vuelta'})`, 'success');
    
    // Animar bus
    intervaloBus = setInterval(() => {
        indice += direccion;
        
        // Cambiar dirección al llegar al final o inicio
        if (indice >= coordenadas.length - 1) {
            indice = coordenadas.length - 1;
            direccion = -1;
            mostrarNotificacion(`🚌 El bus ha llegado a ${rutaData.destino}`, 'info');
        } else if (indice <= 0) {
            indice = 0;
            direccion = 1;
            mostrarNotificacion(`🚌 El bus ha llegado a ${rutaData.origen}`, 'info');
        }
        
        // Mover bus
        busActivo.setLatLng(coordenadas[indice]);
        
        // Actualizar popup
        const progreso = (indice / coordenadas.length) * 100;
        const tiempoTranscurrido = Math.round(rutaData.duracion * (indice / coordenadas.length));
        const tiempoRestante = rutaData.duracion - tiempoTranscurrido;
        
        busActivo.bindPopup(`
            <b>🚌 Bus - ${rutaData.nombre}</b><br>
            <b>🔄 Sentido:</b> ${sentidoActual === 'ida' ? 'Ida →' : 'Vuelta →'}<br>
            <b>📍 Destino:</b> ${rutaData.destino}<br>
            <b>📊 Progreso:</b> ${Math.round(progreso)}%<br>
            <b>⏱ Tiempo restante:</b> ~${Math.max(0, tiempoRestante)} min
        `).openPopup();
        
        // Seguir el bus con la cámara
        map.panTo(coordenadas[indice]);
        
    }, 800);
}

// ==================== MOSTRAR TODAS LAS RUTAS ====================
function cerrarPaneles() {
    const sidebar = document.getElementById('sidebar');
    const notifications = document.getElementById('notifications');
    const routeSheet = document.getElementById('route-sheet');
    sidebar.classList.remove('active');
    notifications.classList.remove('active');
    routeSheet.classList.remove('active');
}

function mostrarTodasRutas() {
    if (todasLasRutas.length === 0) {
        mostrarNotificacion('No hay rutas para mostrar', 'warning');
        return;
    }

    cerrarPaneles();
    mostrarListaRutas();
    document.getElementById('route-sheet').classList.add('active');
}

function mostrarListaRutas() {
    const routeItems = document.getElementById('route-items');
    if (!routeItems) return;

    routeItems.innerHTML = '';

    todasLasRutas.forEach(ruta => {
        const tarifaTexto = calcularTarifa(ruta);
        const item = document.createElement('li');
        item.className = 'route-item';
        item.innerHTML = `
            <button type="button" onclick="seleccionarRuta(${ruta.id})">
                <strong>${ruta.nombre}</strong><br>
                <small>${ruta.origen} → ${ruta.destino}</small><br>
                <small>Horario: ${ruta.horario || 'No disponible'}</small><br>
                <small>Tarifa: ${tarifaTexto}</small>
            </button>
        `;
        routeItems.appendChild(item);
    });
}

function seleccionarRuta(rutaId) {
    const ruta = todasLasRutas.find(r => r.id === rutaId);
    if (!ruta) {
        mostrarNotificacion('No se encontró la ruta seleccionada', 'error');
        return;
    }

    const coordenadas = JSON.parse(ruta.coordenadas_ida || ruta.coordenadas_vuelta || '[]');
    if (!coordenadas || coordenadas.length === 0) {
        mostrarNotificacion('La ruta seleccionada no tiene coordenadas', 'warning');
        return;
    }

    map.fitBounds(coordenadas);
    mostrarInfoRuta(ruta);
    cerrarPaneles();
    document.getElementById('sidebar').classList.add('active');
    mostrarNotificacion(`Enfocando ruta: ${ruta.nombre}`, 'success');
}

function calcularTarifa(ruta) {
    const nombre = (ruta.nombre || '').toLowerCase();
    const origen = (ruta.origen || '').toLowerCase();
    const destino = (ruta.destino || '').toLowerCase();
    const tipo = (ruta.tipo || '').toLowerCase();

    if (nombre.includes('portal 80') || origen.includes('portal 80') || destino.includes('portal 80')) {
        return '$8700';
    }
    if ((nombre.includes('capellanía') || nombre.includes('capellanía') || origen.includes('capellanía') || origen.includes('capellanía') || destino.includes('capellanía') || destino.includes('capellanía')) &&
        (nombre.includes('portal') || origen.includes('portal') || destino.includes('portal'))) {
        return '$7000';
    }
    if (tipo === 'interna') {
        return '$2500';
    }
    if ((nombre.includes('cajicá') || origen.includes('cajicá') || destino.includes('cajicá')) &&
        (nombre.includes('chía') || origen.includes('chía') || destino.includes('chía') || nombre.includes('chia') || origen.includes('chia') || destino.includes('chia'))) {
        return '$5000';
    }
    if ((nombre.includes('cajicá') || origen.includes('cajicá') || destino.includes('cajicá')) &&
        (nombre.includes('fontanar') || origen.includes('fontanar') || destino.includes('fontanar'))) {
        return '$3000';
    }
    if ((nombre.includes('bogotá') || nombre.includes('bogota') || origen.includes('bogotá') || origen.includes('bogota') || destino.includes('bogotá') || destino.includes('bogota')) &&
        (nombre.includes('cc chia') || nombre.includes('cc chía') || origen.includes('cc chia') || origen.includes('cc chía') || destino.includes('cc chia') || destino.includes('cc chía') || nombre.includes('chia') || origen.includes('chia') || destino.includes('chia'))) {
        return '$5800';
    }

    return 'Consultar tarifa';
}

function mostrarInfoRuta(ruta) {
    const proximosBuses = document.getElementById('proximos-buses');
    const tiemposParadas = document.getElementById('tiempos-paradas');
    const tarifas = document.getElementById('tarifas');
    const tarifaTexto = calcularTarifa(ruta);

    if (proximosBuses) {
        proximosBuses.innerHTML = `
            <div class="info-card">
                <strong>Ruta:</strong> ${ruta.nombre}<br>
                <strong>Horario:</strong> ${ruta.horario || 'No disponible'}
            </div>
        `;
    }
    if (tiemposParadas) {
        tiemposParadas.innerHTML = `
            <div class="info-card">
                <strong>Origen:</strong> ${ruta.origen}<br>
                <strong>Destino:</strong> ${ruta.destino}<br>
                <strong>Tipo:</strong> ${ruta.tipo === 'interna' ? 'Interna' : 'Intermunicipal'}
            </div>
        `;
    }
    if (tarifas) {
        tarifas.innerHTML = `
            <div class="info-card">
                <strong>Tarifa sugerida:</strong> ${tarifaTexto}
            </div>
        `;
    }
}

// ==================== FUNCIONES DE UTILIDAD ====================
function zoomIn() { map.zoomIn(); }
function zoomOut() { map.zoomOut(); }

function locate() { 
    map.locate({setView: true, maxZoom: 16});
    mostrarNotificacion('Buscando tu ubicación...', 'info');
    
    // ✅ REGISTRAR EVENTO DE GEOLOCALIZACIÓN
    fetch('/api/log-event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            accion: 'geolocalización',
            descripcion: 'Solicitó obtener su ubicación actual'
        })
    }).catch(e => console.error('Error registrando evento:', e));
}

function cerrarSesion() {
    window.location.href = "/logout";
}

function mostrarNotificacion(mensaje, tipo = 'info') {
    const notifList = document.getElementById('notif-list');
    if (notifList) {
        const li = document.createElement('li');
        li.textContent = mensaje;
        if (tipo === 'success') li.style.color = 'green';
        if (tipo === 'error') li.style.color = 'red';
        if (tipo === 'warning') li.style.color = 'orange';
        notifList.insertBefore(li, notifList.firstChild);
        
        setTimeout(() => li.remove(), 5000);
    }
}

// ==================== EVENT LISTENERS ====================
map.on('locationfound', e => {
    L.marker(e.latlng).addTo(map)
        .bindPopup(`📍 Tu ubicación actual`)
        .openPopup();
    mostrarNotificacion('Ubicación encontrada', 'success');
});

// Paneles laterales
document.getElementById("menu-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("notifications").classList.remove("active");
    document.getElementById("route-sheet").classList.remove("active");
});

document.getElementById("notif-btn").addEventListener("click", (e) => {
    e.stopPropagation();
    document.getElementById("notifications").classList.toggle("active");
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("route-sheet").classList.remove("active");
});

document.getElementById("sidebarClose").addEventListener("click", (e) => {
    e.stopPropagation();
    cerrarPaneles();
});

document.getElementById("notifClose").addEventListener("click", (e) => {
    e.stopPropagation();
    cerrarPaneles();
});

document.getElementById("routeSheetClose").addEventListener("click", (e) => {
    e.stopPropagation();
    cerrarPaneles();
});

// Cerrar paneles al hacer clic en el mapa o fuera
document.addEventListener("click", (e) => {
    const sidebar = document.getElementById("sidebar");
    const notifications = document.getElementById("notifications");
    const routeSheet = document.getElementById("route-sheet");
    const menuBtn = document.getElementById("menu-btn");
    const notifBtn = document.getElementById("notif-btn");
    const bottomNav = document.querySelector('.bottom-nav');
    
    // Si el clic está fuera de los paneles y los botones
    if (!sidebar.contains(e.target) && !notifications.contains(e.target) && !routeSheet.contains(e.target) &&
        !menuBtn.contains(e.target) && !notifBtn.contains(e.target) && !(bottomNav && bottomNav.contains(e.target))) {
        sidebar.classList.remove("active");
        notifications.classList.remove("active");
        routeSheet.classList.remove("active");
    }
});

// Cerrar paneles al hacer clic en el mapa (especialmente en móvil)
map.on('click', () => {
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("notifications").classList.remove("active");
    document.getElementById("route-sheet").classList.remove("active");
});

// Bottom nav items
const bottomNavItems = document.querySelectorAll('.bottom-nav > div');
bottomNavItems.forEach((item, index) => {
    item.addEventListener('click', function() {
        // Remover active de todos
        bottomNavItems.forEach(nav => nav.classList.remove('active'));
        // Agregar active al clickeado
        this.classList.add('active');
        
        // Ejecutar acción según índice
        switch(index) {
            case 0: // Inicio
                mostrarNotificacion('Estás en el inicio', 'info');
                break;
            case 1: // Rutas
                mostrarTodasRutas();
                mostrarNotificacion('Mostrando todas las rutas', 'info');
                break;
            case 2: // Favoritos
                mostrarNotificacion('Función de favoritos - Próximamente', 'info');
                break;
            case 3: // Perfil
                mostrarNotificacion('Abriendo perfil...', 'info');
                window.location.href = "/perfil";
                break;
            case 4: // Cerrar sesión
                cerrarSesion();
                break;
        }
    });
});

// Buscador
document.getElementById("search-input").addEventListener("input", (e) => {
    const busqueda = e.target.value.toLowerCase();
    rutasVisibles.forEach(item => {
        const coincide = item.nombre.toLowerCase().includes(busqueda) ||
                        item.origen.toLowerCase().includes(busqueda) ||
                        item.destino.toLowerCase().includes(busqueda);
        
        if (coincide) {
            if (item.linea) item.linea.setStyle({ opacity: 1, weight: 6 });
            if (item.origenMarker) item.origenMarker.setOpacity(1);
            if (item.destinoMarker) item.destinoMarker.setOpacity(1);
        } else {
            if (item.linea) item.linea.setStyle({ opacity: 0.2, weight: 3 });
            if (item.origenMarker) item.origenMarker.setOpacity(0.3);
            if (item.destinoMarker) item.destinoMarker.setOpacity(0.3);
        }
    });
});

// ==================== OBTENER UBICACIÓN DEL BUS ====================
function obtenerUbicacionBus() {
    // Esta función obtiene la ubicación actualizada del bus si está en movimiento
    if (busActivo && intervaloBus) {
        // El bus se está simulando, no hay necesidad de hacer fetch
        return;
    }
}

// ==================== INICIALIZAR ====================
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("notifications").classList.remove("active");
    
    // Establecer "Inicio" como activo por defecto
    const bottomNavItems = document.querySelectorAll('.bottom-nav > div');
    if (bottomNavItems.length > 0) {
        bottomNavItems[0].classList.add('active');
    }
    
    cargarRutas();
});

// actualizar ubicación cada 3 segundos
setInterval(obtenerUbicacionBus, 3000);
