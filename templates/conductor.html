<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Conductor</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .navbar{
            background:#0d6efd;
            color:white;
            padding:15px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .info{
            padding:20px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:15px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        #map{
            width:100%;
            height:500px;
        }

        .controls{
            padding:20px;
            display:flex;
            gap:15px;
            justify-content:center;
            flex-wrap:wrap;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }

        .start{
            background:#198754;
            color:white;
        }

        .pause{
            background:#ffc107;
        }

        .stop{
            background:#dc3545;
            color:white;
        }

        @media(max-width:768px){

            .navbar{
                flex-direction:column;
                gap:10px;
                text-align:center;
            }

            #map{
                height:400px;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Cajicá en Ruta - Conductor</h2>
        <p>Estado: En servicio</p>
    </div>

    <!-- INFORMACIÓN -->
    <section class="info">

        <div class="card">
            <h3>Ruta asignada</h3>
            <p>Cajicá → Bogotá</p>
        </div>

        <div class="card">
            <h3>Bus</h3>
            <p>Bus 12</p>
        </div>

        <div class="card">
            <h3>Pasajeros estimados</h3>
            <p>24 pasajeros</p>
        </div>

    </section>

    <!-- MAPA -->
    <div id="map"></div>

    <!-- CONTROLES -->
    <div class="controls">

        <button class="start">Iniciar Ruta</button>

        <button class="pause">Pausar</button>

        <button class="stop">Finalizar Ruta</button>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Inicializar mapa
        const map = L.map('map').setView([4.9186, -74.0276], 13);

        // Mapa OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        // Marcador conductor
        const marker = L.marker([4.9186, -74.0276])
            .addTo(map)
            .bindPopup('Ubicación del conductor')
            .openPopup();

    </script>

</body>
</html>
